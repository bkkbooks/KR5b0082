front:
  text: 洞玄靈寳自然九天生神章經注卷上
  hash: sha256:256bdddd7325637d7ad870f3a2a6af4b06c0a1d3b30ab489133a042e8a7e1474
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0082_SJB_001-060464c, image: sjb/06/060464c.png}
body:
  text: 華陽復注洞虛也玄幽遠也惟虛能函衆妙惟幽遠其義深長靈寳者外言聖化妙重內言神降爲靈炁聚爲寳經中三寳獨稱靈寳者紀出書度人之時也自然者其始三炁應時岀見凝結太空鳳篆龍章有形無迹自然成文非聖人有心造設也九天鬱單無量至無結無愛天共九也生神乃發育變化之方經者載道之書修眞之逕路也三寳大有金書三寳天寳靈寳神寳也大有天寳宫名度人經云大有妙庭言天宮豐盛無以加也此書嘗秘藏於是宮金至貴且不壞故以爲名其文叙九章源流天寳君者則大洞之尊神天寳丈人則天寳君之祖炁也丈人是混洞太无元髙上王虚之炁九萬九千九百九十億萬炁後至龍漢元年化生天寳君出書時號高上大有玉清宫天寳君玉清元始天尊也本玄一之炁疑結至髙曰天上有主宰謂之帝道居帝之先故爲元始在人身爲太乙帝君即元神也大洞者教法之權與丈人尊嚴之稱貴而無位化生天寳君名始立矣混洞太無元者鴻濛未剖之時玉虛天形也九數應乎乾陽開化圖云一曰龍漢二曰延康三曰赤明四曰上皇五曰開皇皆天上過去年劫名龍言靈漢言天也岀書即度人經五文開廓普殖神靈也玉清宮天寳君玄座之所祖炁即道道即天寳君推其所以妙本自成上无復祖以虚无爲主自然爲本長而不宰無形無名聖人將立教不可不尊其原故强名以爲道之宗靈寳君者則洞玄之尊神靈寳丈人則靈寳君之祖炁也丈人是赤混太无元玄上紫虚之炁九萬九千九百九十九萬炁後至龍漢開圖化生靈寳君經一劫至赤明元年出書度人時號上清玄都玉京七寳紫微宫紫虛從趙氏本靈寳君上清天尊也自一生二爲无一之炁靈者妙不可測洞玄經法與靈寳皆自大洞中出按藏經衆篇序義云洞玄是本靈寳是迹夫大洞之炁本生於空流爲洞眞次爲洞玄又次爲洞神前章不曰洞眞而曰大洞者言其本也赤混太无元者太无中光象巳萌將發見也自龍漢開國微示其迹至赤明出書人文始宣朗矣赤明紫虛洞陽文彩貌度人者傳流經教皆拯拔生死之道紫微宫靈寳君演教藏經之所其炁較之玉虛虧九億萬數則知道降劫遷散爲萬有不復如太古混然矣竊惟聖人出書之意慮後世澆薄從事於末詐偽機巧夭䘮天年流轉苦海欲今還淳返本貴炁固根以進仙道故出神章諄諄然以警悟之德莫大爲神寳君者則洞神之尊神神寶丈人則神寳君之祖炁也丈人是冥寂玄通元无上清虚之炁九萬九千九百九十萬炁後至赤明元年化生神寶君經二劫至上皇元年岀書時號三皇洞神太清太極宫清虛從趙氏本神寶君太清天尊也由二生三爲始一之炁神者陰陽變化不測之名洞神教法乃太清演太平無爲之道其尊經十二部外如紫虚籙消災禳災清靜天童諸經皆係之也冥寂玄通无者無恩無爲寂然不動感而遂通舊本欠元字三隱賢補入以合三元清虚謂輕清爲天其炁較赤混又虧九萬倉降愈簿太極宫即太清仙境几諸仙得道科教上章皆於此朝謁宫中官僚眞人仙卿濟濟有序大洞法中有三元宫天尊嘗命唐葛周三將軍鎮前宫門其神上合三炁下主人身三部在天輔賛北斗樞機及主治符篆靈文盟劵䓁書若人修大洞功滿此三神導巳飛昇上朝帝官即混合之道也宋致和間仁宗不豫夢行荆棘中周章失路見神人被金甲謂帝曰天以陛下有仁心錫一紀之夀帝曰吾何路可歸神人曰以臣之車相送帝登車問神何人對曰臣葛將軍也帝寤即安令檢道藏果有葛將軍主天門事因加其位立廟京師惜是時無人上奏此神應自身神炁以加保飬之功此三號雖年殊號異本同一也分爲玄元始三炁而治三寳皆三炁之尊神號生三炁三號合生九炁九炁出乎太空之先隱乎空洞之中無光無象無形無名無色無緒無音無聲三號即三清之宫年即五劫開化之年名雖不同其實一理也自玄一之炁化生天寳後分元一始一之炁而爲靈寳神寳三炁旣足而生九炁九炁散爲萬炁以植生物之根且九炁未岀之時沈光晦迹混而爲一不可致詰也導運御世開闢玄通三色混沌乍存乍亡運推數極三炁開光炁清髙澄積陽成天炁結凝滓積滯成地九炁列正日月星宿隂陽五行人民品物並受生成自一分三爲神寳君運㝠寂玄通元之炁以導隂陽成化功總御世人生死三色者玄炁青元炁黄始炁白其始三炁未分乍有乍无機椷已兆將乘運數出矣既分之後天地由之而定位人民品物因之以發生於此見天地人同出於道也天地萬化自非三元所育九炁所導莫能生也三炁爲天地之尊九炁爲萬物之根故三合成德天地之極也三元三炁爲天地祖故曰尊化生九炁運隂陽育萬品故曰根三合者三炁凝合變化無窮生成之德遂焉極之義與太極相合是陰陽五行根樞會總處人之受生於胞胎之中三元育養九炁結形故九月神布炁滿能聲聲尚神具九天稱慶太一執符帝君品命主録勒籍司命定筭五帝監生聖母衛房天神地祇三界備守九天司馬在庭東向讀九天生神寶章九過男則萬神唱恭女則萬神唱奉男則司命敬諾女則司命敬順於是而生九天司馬不下命章萬神不唱恭諾終不生也人爲萬物之靈禀天地中和之炁其未生前在香冥昏默中及因感化入母胎以成人自三元布炁爲三田以主一身九天之炁次第結聚魂魄五藏百骸而具體焉逮至九月二百七十日三九數足然後與母分形斯時聲形神炁皆完九天生神之功於是始備安得不稱慶乎太一按玄鏡云是長生大主上清大洞之太一執符以合百神也帝君乃萬靈帝君品命定其髙下司命即中央丈人名理明初字玄度卿定筭預定夀夭五帝五行之主降五行眞炁於身聖母九天聖母至陰之主喜於成物故呵禁不祥九天司馬嘗典守玉章東向誦經感生炁也萬神唱恭奉如詩弄璋瓦以别男女若司馬不下命章則天命不賦予萬神不唱恭諾則天理不流行惡得而生哉人之有生豈曰易得可不勉進善道以保天之賦與我者乎浮山眞率謂人生爲善陽神相慶曰今日欣慶吾與斯人合乎天矣若爲惡則神相弔曰吾與斯人失前禀賦必同墜幽陰矣東坡與陳履常戒殺詩云不見王武子未死神巳泣正同此意命章者天之所賦爲命即書所謂惟皇上帝降衷于下民中庸天命之謂性天雖不言而寄造化之功於玉章故曰命章夫人得還生於人道濯形太陽驚天駭地貴亦難勝天眞地神三界齊臨亦不輕也當生之時亦不爲陋也所以能愛其形保其神貴其炁固其根終不死壞而得神仙骨肉同飛上登三清是與三炁合德九炁齊并也但人得生而自不能尊其炁貴其形寳其命愛其神自取死壞離其本眞耳人有死生性無死生出生死之外者其聞道乎其見性乎常人結習未除爲業所牽留滯幽陰或相報對業報既盡善性不滅還生人道者必當濯形太陽然後投胎蓋日之上舘一名洞陽宫流火之池中有黃華眞水彼間神人亦以此水灌濯其身長生簡誥文黃華蕩形即此之謂自得爲人經許多節次驚天駭地豈爲輕陋若能鍊養元神返本還淳與三炁九炁脗合皆有骨肉同飛上登三清之理而不自勉致於死壞哀哉昔歐陽文忠公平生不事黃老之學晚年守亳社忽有悟一日問道於石唐隱者隱者答曰公屋舍巳壞難復語此但能明了前境猶庶幾焉公文章事業冠當世豈無受道之資但失之不蚤耳雖然造道之功在於悟性須當培養命基爲本若不能尊炁貴形保命愛神坐致衰老永枯鉛耗命基即削眞性亦昏而於此時修鍊所謂渴而鑿井不亦晩乎九天生神章乃三洞飛玄之炁三合成音結成靈文混合百神隱韻内名生炁結形自然之章飛玄者元始之炁飛翔太空合三洞而成文音諧金石萃天地生生之意中有百神内名誦之神聞呼名則聚而通靈五樞經云身中九靈何不召之召之則言身中三精何不呼之呼之則慶天寳誦之以開天地之光靈寶誦之以開九幽長夜之魂神寳誦之以制萬靈太一誦之以具身神帝君誦之以結形九天誦之以生人學士誦之以昇天三寶君誦玉章者宣道妙也太一者太一元君也帝君者太一帝君也玉章雖一誦之者不同各隨道德力量開化感召有淺深等殊也鬼靈聞之以昇遷凡夫聞之以長存幽魂聞之以開度枯朽聞之以發煙嬰孩聞之以能言死骸聞之以還人鬼靈鬼官也飛仙寶劎經載蕭邈有才望爲善爽之鬼四百年方得爲地下主今聞經不待限期有昇遷之望矣凡夫者六欲俱全因經而清静則在世可以長存幽魂乃地獄幽囚之鬼聞經有開度之辛張麗華乞神章薦披是也枯朽者腐木死草發煙元炁復生回仙在嶽陽城南以丹度老樹是也嬰孩能言孔竅開聰死骸還人徐甲既爲枯骨老君以太玄生符起之即此理也三寶神奥萬品生根故非鬼神所知凡夫所聞也玉章乃三寶君之所貴重其功用爲品彙生成根本原其奥理雖鬼神有靈亦莫得而聞况凡夫乎夫學上道希慕神仙及得尸解滅度轉輪終歸仙道形與神同不相遠離俱入道眞而無此文則胞胎結滯死炁固根眞景不守生炁無津九户閡塞體不生神徒受一形若寄炁而行學得此法可坐致自然上眞之道七太上之道三中眞之道六下眞之道八此章與大洞經三十九章義同學仙之人力量蹇淺未出三界止得尸解雖未免滅度轉輪然是人終歸於仙道蓋能愛形保神則近於道也眞誥載人死如生足不青皮不皺目光如生皆尸解也無此文者謂不得玉章大洞要法不能斬伐胞胎結滯則恐死炁固其命根眞景不能長守眞景者神光也此言雖得尸解亦徒受一形若寄炁於身枯木蹔春津液不滋不能乆存也得此法者謂混合百神之訣也大抵人之一身皆三炁所生旣受既炁與元始爲一皆可混合凡炁之所在神即隨之初以三炁生三神分化三部八景二十四神若能混合變化三五眞人以成正一可以呼陽召陰出入無方陽炁化爲龍鸞陰炁化爲玉女駕飈輪於八極之表坐致自然豈欺我哉三寳尊重九天至眞秘之大有九重金格紫陽玉臺自非天地一開其文不出元始禁書非鬼神所聞竊之者風刀萬劫魂死無生依科尊奉形神同仙按七變儛天經載上清寳經三百卷玉訣七千篇符籙七千章及自然之章秘在九天之上大有之官此其一也九重金格紫陽玉臺皆藏經之所九重猶言什襲也格乃書架之類道寳經有玉格金格之說秘固既嚴鬼神何敢竊視迨乎天地開朗玄風流行眞文寳符以時下降尊奉之乆必得悟解冝其形神同仙也三元宫中宿有金名紫字刻書來生應爲三清神仙之人當得此文有其縁會當齎金寳奉師効心依科盟受閉心奉行愼勿輕泄風刀考身三元考校不獨死魂凡得道與未得道者皆在焉惟金名紫字以旌别學仙之人藏經中載三元考校地獄之品謂之墨籙即黑簿也與金名紫字者霄壤之異也昔李珏江陽小民功行乆在仙籍雖未昇舉而姓名仙官已用金書子華陽洞天矣不特仙家有此如梁元帝爲湘東王時嘗録忠臣義士及文章之美者以三等筆書之忠孝者用金管德行者用銀管文章美者用斑竹管亦有分别也此言夙有仙縁之士名紀仙籍者方得受持玉章齎金寳奉師効心不輕傳也閉心奉行者息心屏慮靜定以行經教也泄慢之者自貽譴殃修行之法千日長齋不關人事諸塵漏盡夷心默念清香執戒入室東向叩齒九通調聲正炁誦詠寳章齋者一志虚心也修行之法期三年有成也未齋之時此心與物交關風馳火熾無時蹔息既齋則齊其思慮以至湛然常寂與太虚爲一也道書載八漏目淚肝漏鼻涕肺漏口唾腎漏外汗心漏夜盗汗小腸漏寝而涎腦漏夢與鬼交神漏淫慾身漏已上諸漏心君定則止矣或者平也默念存想至眞也昔葛仙翁長齋於天台山曾未一年感通上聖曲盻幽房此長齋之應也入室東向迎合生炁叩齒左爲天鍾伐鬼靈也右爲天磬集百神也中爲天皷朝眞聖也叩齒焚香調聲正炁皆誦經之要法誦之一過聲聞九天誦之二過天地設恭誦之三過三界禮房誦之四過天王降仙誦之五過五帝朝眞誦之六過魔王束身誦之七過星宿停關誦之八過幽夜光明誦之九過諸天下臨一切种靈莫不衛軒此章合天人一貫之妙天與人無二理吾之心即天地之心吾之炁即天地之炁既秉一誠此感則彼應一過者披誦過一章也聲聞九天昔宋景公一言熒惑退合湯以六事自責大雨數千里其感應若是況誦詠祖炁之音乎蓋祖炁之化大而天地普而三界星宿五行外而魔王下而幽爽一切神靈莫不由此分流布化隨其所在因有善惡髙下之殊冝乎二過天神地祗聞之而設恭敬三過三界神明下禮誦經之房四過天王降仙道家天神有法王天王之號感召下降如葛仙翁精思齋法致徐眞人下降傳經是也五過五帝五炁之主見眞經所在而禮敬焉六遇隂數魔王乃六天大魔同元始布化齋醮有命魔之法以驅逐之今聞經束身不敢干犯七過星宿停關即度人經璇璣停輪神光大定也八過幽夜顯光以陽破隂也九過諸天下臨神靈衛軒如李順與誦大洞經三年一夕忽有飛仙千數集於空中神光照室遂得道功德所感尸居而龍見淵默而雷聲不期然而然也一過徹天胞原宣通前言外應此言内功以明還丹大洞之方一過胞原宣通者天一生水也人之受生始自胞原凝胚黃演之炁流布升降不失其度則生意漸滋若胞原不通必有天閼之患修眞之士内丹初下功夫念想炁息皆定精神始聚命門下關自此開通二過響地胎結解根地二生火二月成胎尚恐死炁故根爲之結固必假眞炁薰蒸解散方遂長養上清洞玄經有太一帝君解三關十二結符朱書青竹膜中祝以解之三過神禮䰟門鍊仙天三生木在人爲䰟三月隂陽始分䰟具質成䰟門在左屬陽丹功三轉陽炁乃足其法凝神入息以養之由是神智自生青帝護䰟木公書簡四過天王降仙魄户閉關地四生金在人爲魄四月生魄魄户在右屬陰鋉丹四轉以陽養陰令魄與魂相載其法鼻爲天竅通肺肺主魄湛然不動絶去來之息謂之閉關自然華池水滿下沃心絡心火下降腎水上昇丁壬配合以同内丹若不閉關則魂散蕩隨夢出入魂不能制任其用事終入鬼羣矣五過五帝朝眞臓腑清凉天五生土人生五月五行炁足生五臓六府五職心肝脾肺腎六府小腸膽胃大膓膀胱三焦清凉者安靜而不煩擾也修眞之士絶慾則腎不漏精靜默則心不失神定息則肺能安魄簡視則肝能育魂凝思則脾能安意黄中通理保合太和精神魂魄意聚而爲一是謂攅簇五行其炁上朝泥丸是謂朝眞然後青帝護魂白帝侍魄赤帝養炁黑帝通血黃帝中主萬神無越六過魔王伏諾胃管生津魔王以内言六慾是也諾順也制以玉章故順伏焉胃與脾爲表裏貯水榖以養五臓難經謂五臟之炁皆會于胃且津之潤燥繋於思一爲六欲所誘思不得其正則見食爲涎逢哀爲淚媿生汗怒涌血徃而不返内失滋養精炁與神從而散泄但餘枯骸是爲死之徒若六魔伏諾恩得其正有主干内則津生胃胱灌溉四肢流潤丹鼎精炁與神因之凝合生之徒也七過星宿朗明孔竅開聰天有七曜人有七竅至七月俱開以司視聽食息岀納或謂聰明本出心七應火數上智之人心有七乳故聦明愚者鮮開或少故昏濁丹功七轉重關豁滯上下明徹心印經云七竅相通竅竅光明聖日聖月照耀金庭八過幽夜顯光三部八景整具形神烟蘿子云八月神具三部上中下三部也中盟籙載上部八景髮神腦神眼神鼻神耳神口神舌神齒神中部八景肺神心神月神脾神左腎神右腎神膽神喉神也下有八景胃神大腸神小膓神胴神𦙞膈神兩脇神左陰左陽神右陰右陽神也合爲二十四以應二十四炁上部之神以腦神爲宗平旦存之中部神以心神爲主日中存之下部之神以腎神爲主夜半存之八過功夫將滿自然身有光明照徹幽顯三部八景之神悉皆整具而無怠情度人經云八景冥合炁入玄玄九過諸天下臨三關五臓六腑九宫金樓玉室十二重門紫戸玉閤三萬六千關節根原本始一時生神黄庭以口爲天關手爲人關足爲地關又腦下爲上關夾春爲中關内腎相對爲下關臟腑見前注九宫洞眞經云兩眉間入三分爲雙丹宫却入一寸爲明堂宫三寸爲丹田宫亦名泥丸宫四寸名流珠宫五寸爲帝宫明堂上一寸名天庭宫洞房上一寸名極眞宫丹田上一寸爲玄丹宫流珠上一寸爲太皇宫金樓即喉嚨一名重樓中有十二亭長持玉戟以守之主通上下炁黃庭經曰重中樓閤十二環自髙自下皆眞人玉室腦宫之别名黃庭爲之瓊室紫户素靈中篇云兩眉之上其裏有紫戸洞房外有萬靈帝君名逢凌梵守之玉閤者玉堂也即下元丹田陽神一萬八千陰神一萬八千合爲三萬六千此言人在胎中形炁變化至九月滿足身中萬神一時同生修眞九轉聖胎具足萬炁齊仙亦復如是九過爲一徧一徧周竟三界舉名五帝友别稱爲眞人十徧通炁制御萬靈魔王保舉列上諸天百徧通神坐致自然太一度符元君受生千徧通靈坐在立亡仙童玉女役使東西萬徧道備馳騁龍駕白日登晨三界舉名天人交賛其德五帝者五方五炁之主友别者録其善功視之如友别於常人也鍊身成炁謂之眞人十徧通炁者道炁周流鬼神攝伏也魔王保舉初學道則魔王試之試而不退則保舉之登名天籍方成道也道神者變化無方坐致自然不假恩爲如能致六甲行厨之類是也太一度符太一乃百神之主符喻身中靈炁度人經云執籙把籍保命生根元君女仙之號人身炁之母也道徳經云我獨異於人而貴求食千毋千遍通靈功夫純熟妙用難測坐在立亡仙童玉女役使東西者守三一之法也上清明堂玄丹眞經云若道士行太上召三一守形之法得與眞人相見通靈徹視坐在立亡役使六丁上帝給童女各十二人以侍左右至於萬遍此心與經混然爲一可以乘雲鴽龍遊宴太清登晨者昇舉乘旦炁之清存太一混合多用此時黃庭經曰羽服一整八風驅控駕三素登晨霞洞玄靈寳自然九天生神章經註卷上
