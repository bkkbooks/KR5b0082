front:
  text: 洞玄靈寶自然九天生神章經注卷中推二
  hash: sha256:857d27294060d3475176f176fff18858f99ead650ef68b31ec0796190a7747ab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0082_HFL_002-001a, image: hfl/0188/0188-050.png}
body:
  text: 華陽復注元始天尊時靜處間居偃息雲宫黃房之內七寶愇中熙夷養素空碧鍊真耽咀洞惠俯研生神理微太混嘯朗九天天尊間居偃息飬素鋉真靜中自適熙夷太和也空碧始青天氣也雲宫黃房七寶愇天宫粧嚴也咀研玩味也洞惠生神道書㫖義也理微大混至理幽微不露端倪也嘯朗者舒嘯軒豁靈襟也是時飛天大聖無極神王玉輔上宰四協侍晨清齊建節侍在側焉憑瓊顏而妙感仰靈眸而開襟竊神章而踊躍餐天音而蒙生敢乘機而悟㑹冒靈盻而披心神王上宰侍晨皆近臣四協與四輔同前疑後丞左輔右弼也清齊者虛心以待問建節者神王手持奉命用以徵召萬神瓊顏玉潔也靈眸靈盻言無所不照神王此時仰瞻天顔聞天音而慕神章豁然有悟因乘機冒干靈盻彼陳夙心有所請焉於是飛天大聖無極神王前進作禮稽首而言上白天尊賤臣幸㑹得仰侍靈軒不以短狹叨濯冥津重悟凝玄位登神王總御生死領括天仙賞監七覺遠覽遐方雍觀上宰對曰侍晨神王欲請玉章先致詞於天尊自言不量短狹之才叨濯心垢於冥海之津重悟凝玄者深造玄玄也總御生死以下皆神王之職分也賞監七覺承帝命錫寵於學道之人也蕭真祐謂七覺者靈寶定觀經云學道之人有七候一者心得定易覺諸塵漏二者宿疾普消身心輕爽三者填補夭損還年復命四者長生久視名曰仙人五者鍊形為氣名曰真人六者鍊氣成神名曰神人七曰鍊神合逍名曰至人雍和也言職當雍和仰觀以事上宰若侍晨與之對司也方當乘機應㑹履九太陽洞履陰符撫掌兆民大運將期數終甲申洪流蕩穢凶災彌天三官鼓筆料别種人考算功過善惡當分機者事之先會過也履行也九乃亢陽洞通也符籍也言陽極陰生通履陰籍三官天地水也鼓動筆端分别人之平生善惡以降體咎種人蕭真祐云四梵天謂之四種民天在二十八天之上三災之所不及也神王愍當時有洪水之厄故乘機請經宣揚道力以極救之自赤明以來至上皇元年依元陽玉匱受度者應二十四萬人赤明靈寶度人之時上皇神寶出書之時元陽乃紫微之宫九幽玉匱有明真科條紀人功過受度者皆為善之人開皇以後數至甲申諸天選序仙曺空廢官僚不充遊散職司皆應選人開皇天上劫名在上皇之後定録君曰昨東華集諸司命土地靈神典司之徒撿課簡録見天下之人為善者少五十分中無一况為神仙者乎仙曺空廢無稱職者又遊散諸司亦皆怠情考校有過者上仙降為下仙下仙點為地下主者俾其攺悔勤修仍復舊職昔上元夫人位至元君不勤帝局虧替正事降適過禮朝宴失節輕泄天寶降授下真削真皇之籙退紫虛之任以此見仙曺陛點豪髮無差依元陽玉曆當於三代更料有心積善建功為三界所舉五帝所保名在上天者取十萬人以充其任又當别舉一十二萬人以充儲官前云玉匱校死魂也此言玉曆紀仙曺之職也三代祖宗積善也擇其奕世有功者充仙官之任儲者副二之職如此之例或以宿名玄圖此選仙官之例取名在上天者如司馬子微名在丹臺絳闕之類或骨像合仙人禀天地之清氣生而不俗鶴頸龜腮碧瞳雙踝飄飄然抱凌雲之姿所謂道林法器者足膺此選或以滅度因緣轉輪修行道未成而終曰滅度亦得遷轉為仙官昔鄭仁安生於禪黎三日能言便知宿命年十二面有玉光棄家遊山林後滅度於北戎之阿獲證果號丹靈老君是也或篤好三寶善功徹天三寶道經師也教法存焉學者誦其言以明其道又能轉化未悟皆篤好也又祕真藏經曰貪性寂滅塵纍無染戒行不虧名曰法寶嗔性不起不憤外塵定無生轉是名師寶凝性無取無惱無患惠通無礙是名道寶貪嗔癡三毒消滅則三寶自見善功徹天矣或供養師寶為三官所稱師者所以傳道立教授經也自古仙聖無師不度至於常人學業亦因師以傳授可不散信而供養乎服勤盡誠確遵教戒冝為三官稱舉或修齊奉戒功德積感齊者齊其思慮薄味全真戒者和靈寶九戒正一十戒之類奉持久久不怠以積功德李昌齡曰日用之謂功日新之謂德天仙一千三百善日行一善只在四年地仙三百善行之只在一年但人多中道而廢不聞穿䂖禮樹之說乎紫虛元君曰昔傳先生自少好道入焦山䂖室中積七年忽遇太極真人授以木鑽使之穿一磐䂖戒曰石透吾當度汝䂖厚五尺傅穿之不怠積四十七年䂖忽透真人果來度之南嶽夫人曰昔有人勵志於道然不知求道之方唯日夕禮一枯樹如是二十八年樹忽生花有汁如蜜其人取花及汁吞服遂得長生噫木䂖無情尚能感通况修齊奉戒積功德以格髙靈者乎或施散財寶建立道堂凡殖貨財貴能施賑否則為大盜積耳徒貽逹者之笑建立道堂乃興創琳字安奉尊像演說經教使人生善心妙法本相經云太玄紫虛真人悟前生造招賢集仙道館寫經萬卷常以齊食衣服供養不輟得為真人事載琅函誠不虛也或救恤窮乏載度天人惻隱之心人皆有之何忍見窮乏而不救乎冝隨力量而恤之昔周惠化好布施雖窮困辛苦不倦智觀真人化為丐者以驗其事周果樂施即日度為西華真人宋聖曆間梓州大饑佑聖真君化為一叟賣蒸鳧蘇所活者衆建隆末河北路饑真君又化為商運粟麥十五萬斛入城商忽不見官取賑濟傍及鄰郡真君位登髙真猶如此者一念好生之仁如天不息也又如黃兼濟糶粟不增元價紫府真君敬禮令坐太守張乖崖之上王士良糶米令糶者自量一言而降甘雨功行昭然吉人為善可不勉哉載度者若地之載物舟之度人也或為三師建功充足天官有名三師經籍度三師也立科範以濟度死生學者遵其遺法揚道化以立功行若積纍充足天官書名矣考算簿録三官相應皆逆注種名上下有别毫分無遺三官分九宫總二十七府百二十曺左陽生宫右隂死宫左府青簿書功右府黑簿書過其有罪中涉福福中涉罪不專於一曹也或三年或九年或二十四年皆考算之期若三官文籍相同方注種名之數逆注者善未足亦注入又九幽之府被東華青宫九龍符命使拔九幽玉匱男女死魂宿名有善功德滿足應受開度者取三十二萬人以充甲申軀除之後開大有之民九幽之府九地九陰治死魂處東華青宫按黃氣陽精經云扶桑洞陽也主領生籍以九龍符命下九幽府選擇男女死魂嘗有善功者以受開度大有者蕃盛也當此之時生死交會善惡分判得過者真為樂哉分判别白善惡也為惡不免於殃作善召釋而無害豈不樂哉然三官相切文墨紛紜龍門受㑹鳥毋督仙萬聖顯駕盡夜無閒功過平等使生死無偏比之昏閙亦臣之憂矣大期既切觸事闕替恆恐一旦受罹公門切磨也文墨紛紜簿書繁冗龍門在河東木㑹之處浮山真率謂鳥毋水神也嘗於過去劫奉坤毋之召於龍門制會河源仍以大鳳車於水中載學仙之人升于昆崘所謂督仙也萬聖千真察人善惡使生死皆當於公道神王不勝事煩恐有遺闕未免於憂伏聞天尊造大慈之化垂憐蒼生開九天之奧以濟兆民明科有禁戒非賤臣所可參聞然大數有期甲申垂終運度促急大法冝行玉清修行四法以慈為先老氏三寶以慈為首聖人擴而充之無一物不被其澤明真科戒傳經限期育定今神王請非其時者急於度人也使有心者得於考算之中聞於法音開示於視聽勸化於未悟者也緣慈上陳懼觸天顏願見哀憫賜所未聞諸經欲使有心學道而未悟者得霜玄化進修善行免獲戾於三官也於是天尊俯几髙抗凝神遐想仰誦洞章嘯詠琳琅良久忽然歎曰上範虛漠理微太幽道逹重玄氣冠神霄至極難言妙亦難超俯几有接下之容髙抗仰之彌髙也凝神遐想有所思也仰誦洞章嘯詠琳琅清響振激也上範虛漢理微太幽道逹重玄氣冠神霄者經之妙範至理虛曠幽遠其道則通貫衆妙其氣則肇自神霄神霄者九霄之一也領率諸天此言玉章有不可名言之妙諸經未有出其右者也子既司帝位受任神王飛天翼於瓊闕四宰輔於明輪遐盻極覽領綜無窮雍和萬化撫料蒼生神王司位則為帝受任則為王三十九章注訣謂瓊闕太微之館實天帝玉字也又云人間日月為明輪皆須神王翼贊而宰輔也此外雍和萬物生化遐盻極覽四方領綜事務非止一端今大運啓期三五告辰百六應機陽九激楊洪泉鼓波萬災厲天四宫選舉以充種民三代昏亂善惡冝分子當勞心兆庶疲於三官興廢之際事須聞能今以相委其勉之焉此天尊昔勉神王救民於洪水之中寶書妙重九天靈音施於上聖非鬼神所聞明真有格四萬劫一傳今冒禁相付子祕之矣愼勿輕傳傳授靈章丁寧告戒如是之切可不證與登命九天司馬侍仙玉郎開紫陽玉笈雲錦之彙出九天生神玉章四輔列位五老監真太一命辰玉帝唱盟一依俯仰明真具典南向長跪以付飛天無極神王法事既畢諸天復位登命不移時也侍仙玉郎典經之官紫陽藏經之所玉笈雲錦貯經之囊四輔與四協同五老玉清昊極元老虛皇靈光始老玄華寶天真老露眇太極祖老娑鬱洪京仙老太一中黃太一命辰擇良辰也玉帝髙上玉帝也監真唱盟俯仰長跪皆明真傳經之式天尊重告飛天神王此九天之章乃三洞飛玄之氣三會成音結成真文混合百神隱韻內名故大一戒觀攝生十方領㑹洞虛啓誓丹青混合隱韻見前注王隱賢謂戒字當作試言嘗令太一之神試觀學道人若心不退方許啓誓丹青傳授立成訣云昔受神經人有試吾者無故以杖槌吾手血出吾猶傾心信向之經法有試投之約未受之前無故舉火燒其衣衣盡而猶不言方為不退轉金玄羽書經載傳授之法皆五老啓途太一試觀十方則試字誤作戒審矣六洞之中以洞虛屬西然元始天尊令太一攝生十方主攝生氣又兼死籍故云領會洞虛也丹青者秋血為丹齎繒為青用以效信立盟目無億劫因緣宿名帝圖不得參見得盻篇目尤祖同仙當採擇其人應為仙者七百年中清齊千日齎全繒誓心依盟以傳愼之則享祚漏之則禍臻享祚則福延九祖德重山海招禍則考流億劫痛於毒湯風刀相刑可不慎之馬億劫因緣積纍非一世也如許真君上升時上帝詔云𡖥自多劫之前積修至道勤苦備悉經緯逾深萬法千門罔不斯曆今當升舉即命左大力天丁與流金火鈴照辟中黃無或散慢仍封遠祖許由為玉虛僕射曾祖先祖父爵皆有等差然則宿名仙籍旌陽有焉得盻篇目九祖皆仙况誦詠是經者乎今下士聞道則笑之惟其不信故不得聞非道棄絶於彼乃彼自絶於道耳無他焉宿惡深重障隔善心故也五帝內真經云得道之人自無仙骨刻名玉書來生不得盻其篇目有得其文則為五嶽宗師大洞經云凡修道者先解冥結故云九祖同仙七百年出經之時也清齊千日傳經之期也今繒寶帛受經質信也玉章祕於上天傳之不易受持者當嚴尊奉以明蘊奧庶不負神王請經之初意也洞玄靈寶自然九天生神章經注卷中
