front:
  text: 洞玄靈寳自然九天生神章經注卷下推三
  hash: sha256:f2b4293a2f2c752bc33b982665faa4e06e73585640ba84381a690683c6943a78
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0082_HFL_003-001a, image: hfl/0188/0188-076.png}
body:
  text: 華陽復注鬱單无量天生神章第一天炁蒼色三元眞經曰人之炁䰟得之於天體𩲸得之於地無形無象自空中來從無至有住胎中十月其實九月每一月得一天之炁以生神九月炁滿神具岀胎成人西山記曰善養生者由無而有不善養生者以有還無人當炁血方剛以所得神炁付之情欲血炁既哀以所有䰟魄復歸天地身爲枯木矣惟修眞之士知精神魂魄皆天蹔假於我故寳愛凝鋉乆假不歸皆爲我有矣金書祕字云此天乃天魂精開陽之炁帝眞胞命元元一黃演之炁帝諱𩃇雲笈七籖云龍漢元年化生紫霄黄演君位居紫霄太皇大梵天宮天中之帝以眞炁爲胞命元之始王隱賢曰九章各有帝眞命元四字乃黄庭元王在命門之下主生育之炁以宰制謂之帝以太一不𥻑謂之眞九天列正皆從帝眞之命命一定而不易也元者炁始生之名易曰大哉乾元萬物資始至哉坤元萬物資生當其元炁自下而萌初胞狀如垂囊附於脾脾屬土物所由生中黃太一爲人巳命其炁流演不窮故云元一黃演混合空洞炁飛爽浮幽寥延康无期劫眇眇離本條苦魂沉九夜乗晨希陽翹道君曰元炁本於眇莽幽㝠之外生乎空洞之間合而散散而合也人未受生魂爽浮游於幽寥之地渺然無依自天上徃昔延康劫到今不知凡幾度生死岀没如花果之離本條飄落散漫不入于土九夜者九地也鬼屬陰常居黑暗從其類也沉淪既乆皆欲翹首迎望太陽晨光以希開度大有通玄戸鬱單降神霄黄雲凝靈府陰陽炁象交胞元結長命惡根應化消此修眞下乎工夫也大有玉清宫名人身泥丸是也一陽初動吸大有宫之炁直下制伏陽精以通玄户即臍後宻户也又得鬱單无量天降天晨金霄帝一雌雄之神於身中天晨爲雌金霄爲雄陽精經云回陽精於浮黎采黃炁於鬱單雌一雄一即心液腎炁爲嬰兒姹女也火上水下何以能交若能存守中黄端凝靈府即心也内想不岀外想不入則水火陰陽自然交合陰陽既交五行顛倒靈芽自生胞元結就爲先天至精生生化化之基賦命一新向來惡根宿愆皆湔滌不復爲累浮山眞率載閔仲先生之師曰寂然不動土之性也是爲眞土蓋根塵巳絶萬慮俱泯一眞純全冥然寂然此鴻濛混沌時也雲宫黄房處也冲和之粹氤氳有象故曰黄雲至此則日月合璧神炁混融玄珠將成象太一漸歸眞桃康合精延二帝秀玉飄灌溉胞命門精鍊神不彫桃康命門之神字合精延爲大洞之尊神守人臍下二帝靈帝尊帝也隱書云靈帝无太一則玄虚不回炁尊帝无太一則三一不居二帝之力並行不相悖也秀玉飄深白貌一身生生之理從此發源十二時中太一之神運靈津灌溉命門以固胞元所謂精鍊神不彫黃庭經云溉養靈根不復枯閉塞命門保玉都九天命靈章生神神自超元君遏死戸司馬誦洞謡一唱萬眞和九遍諸天朝稽首恭劫年慶此榮舊苗九天帝君降靈章之功召集眞炁以生神神生可以超凡入聖人身生門三十九死户三十九既得生則恐死戸復開命元君炁毋遏閉不令故炁侵也黄庭經曰須得至眞乃顧盻至忌死炁諸穢賤是也長生司馬歌洞章以贊生成之功司馬一唱萬眞交和悦而相應也九遍功滿諸天之炁皆來朝合喜曆劫至今遇此機會向者已離本條今復茁苗如舊豈不欣慶耶黙希子云學道全眞在此生迷人待死更求生有生不可无生理縱得生知何處生詳味此詩可為生神皷吹也上上禪善无量壽天生抃章第二天炁赤色金書祕字云此天魂精陽明之炁帝眞胎命元洞㝠紫戸之炁帝諱雲笈七籖云龍漢元年化生太霄洞㝠君此天之帝以眞炁爲胎命元之始西嶽寳眞人云凡人二月爲胎一身本根從兹肇生故曰胎命元眞人結胎神居紫户根系命門緜緜若存无少間斷謂之胎息南華經云眞人之息以踵靜而炁深也衆人之息以喉躁而炁淺也淺則胎元易散眞炁易耗命門在北謂之洞㝠以其炁上升於紫户故曰紫户之炁紫户在兩眉間髙一寸却入骨三分无量結紫户炁尊天中王開度飛玄爽凝化輪空洞故根離昔愛縁本思舊宗幽夜淪遐劫對盡大運通无量壽天降注靈炁結於紫户在九天中爲炁尊帝也飛玄爽者謂死魂初爲人時亦禀三洞飛玄之炁也天帝凝佇碧落轉輪化端於空洞中以開度之頓令脫故根昔愛之障獲依縁大道爲本明悟舊日性宗且昔者因貪愛受苦沉淪幽夜動經遐劫今報對巳盡當大運啓期可以更生矣帝眞始明精號曰字元陽嬰兒史伯華結胎守黃房斬根斷死户熙順養嬰童人受先天之炁而生有生之後一點元靈復歸兩腎中間即帝眞也始名精字元陽乃命門下一黃庭元王之名主此帝眞嬰兒史伯華乃泥九天帝君上赤子名玄凝天共秉眞炁結胎黃房之中黃房中宫也胎炁旣成有神守之惡根死户謂在心結習惡機欲根即須斷絶稍有干犯則鉛飛汞走常令中和頥養聖胎成嬰童也禪善導靈炁玄哺飛天芳華景秀玉質精鍊自成容務玄育尚生羅列備明堂天帝導引靈炁前既結胎此當養胎也始自紫户下三關復由泥丸降華池含漱芳香故曰玄哺灌溉周流嬰兒眞炁充足自然體質如玉精鍊之乆容貌自成也黃庭經云口爲玉池太和官嗽嚥靈液災不干體生光華炁香蘭却滅百邪玉鍊顏審能修之登廣寒王隱賢謂華景采服日月光華以養胎解結自然容質玉澗胎中有二神一曰白炁君名務玄子字育尚生一曰玄歸子字盛昌其神與胎命同生偕諸神羅列明堂中蕭氏云人身三田皆有明堂洞房之室太虚感靈會命我生神章一唱動九玄二誦天地通混合自相和九遍成人功大聖慶元言散花禮太空諸天並歡悦一切稽首恭帝命玉章生神太虚中感百靈交會正易所謂乾道變化各正性命也動九玄者一過聲聞九天也天地通者二過天地設恭也陰陽和合九遍數是人物皆被生成之功元者善之長言則無不利諸天悦者天道貴生也梵監須延天生神章第三天炁青色金書祕字云此天魂精始陽之炁帝眞魂命元長靈明仙之炁帝諱雲笈七籖云龍漢元年化生音霄明仙君以眞炁爲魂命元之始西嶽竇眞人云受胎三月三炁周三魂降而神靈長趙玉蟾謂魂是陽炁陽炁明故曰明仙長靈即黃庭經云黃炁鬱勃清且長須延總三靈玄元始炁分落落大梵布華景翠王尊須延天帝總攝三魂長靈明仙之炁實自玄元始分化落落廣漢之象大梵者諸天之炁布滿十方魂藏於肝屬木應春其色青故曰華景翠玉尊明梵飛玄景開度長夜魂遊爽赴期歸炁炁返故根人之受生必本於梵炁中有受生之神名曰明梵救苦總呪有六炁威遵明梵演招蓋指此也玄景龍名言明梵之神乘龍飛空開度死魂於長夜隂境游爽謂魂爽游蕩今得受生若乆遊赴歸期也炁炁返故根者昔年一身已散之炁皆還元也太帝號陽堂字曰八靈君九開回録道胎炁生上元陵梵度命籍太一輔精延泥丸敷帝席三部八景分魂生攝遊炁九轉自成仙太帝精魂名陽堂玉字八靈九開天帝魂名回録道字絕冥川太素玉籙云三月爲魂其炁本自胎而生又太和皇成老子主胎元之炁出入於紫微正在崑崙太一所居之處即泥丸上宫也故云胎炁生上元陵梵乃萬靈帝君又名神丈人字履昌靈守人兩眉間紫戸内宫司人年命壽夭精延乃命門桃康君字守臍中闕主握一點元陽之炁亦合會于泥丸上宫太一尊神務猶收在玉桃下泥丸後户輔而翼之與之混合還敷正其席於是三部八景之神亦各分布整具嚴肅修眞之士養陽聚魂則八景合光洞照泥丸收攝萬靈晨登天老之室聚精會神伐滅胞根上昇仙都大洞經云太帝上无炁日中司命童煥然成光明披霞乘帝墉列坐震靈席混合五日同八景照泥丸朗然洞房中琅琅九天音玉章生萬神三遍列正位炁參八辰門玄關遏死戸靈鎮津液源應會感靈數明道潜廻輪慶此嬰兒蛻稽旨讃洞文九天玉章音韻琅然下生萬神三轉一身神炁各正厥位八辰門遷神經注云人頂骨有八片上應天之八門紫虚道君洞房上經云上紫門望八辰引丹宫具明神是也天之八門東名青華元陽門南洞陽太光西通陰全闕北陰生廣靈東北靈通禁上東南始陽生炁西南玄黃髙晨西北九化梵行門也或謂身中八景之炁上參此八辰之門玄關謂下丹田眞訣云守閉玄關內引九眞三炁運液灌溉丹田臍下三寸即生門也生門若關死户目關如此則靈炁鎮靜津液源源而生以滋百骸學仙之人善縁夙契外能宣明道化内能潜回一身陰陽之樓專炁致柔功成九轉身外有身嬰兒蜕矣寂然兜術天生神章第四天炁縁色金書祕字云此天魂精太陽之炁帝眞魄命元碭尸冥演由之炁帝諱雲笈七籤云龍漢无年化生碧霄演由君故此天中之帝以眞炁爲魄命无之始魄爲物魂爲神魂炁主昇魄體主降魂輕清魄重濁故云碣尸𥓘者如石之國也冥演由者自由好逐之義以魄屬陰好遊蕩故曰冥演由寂然无色宗兜術抗大羅靈化四景分萬條翠朱霞上章言玄元始炁分即三炁分化此言四景乃三炁之下梵炁所化之天也抗蔽也居大羅之下若藩蔽然翠朱霞梵炁流布之景遊魄不顧返一逝洞群魔神公攝遊炁飄飄錬素華榮秀樁劫期乗運應靈圖魄者陰靈之聚好遊蕩欲人死逝去逐於六洞陰魔以爲得朋仙經有制魄之方閉炁七息叩齒七通心存鼻端白炁須臾漸大貫一身然後嚥液七口急呼魄名尸狗伏矢雀陰蜚毒天賊除穢臭肺呼畢静定則魄自寧神公王氏謂玉清上相曽受命制伏北酆掌討罰之師故號神公伏其威武攝回遊魄又肝神无英公子名玄元叔字神公子主魂修鍊之士必使魂常附魄如日光之載月質魄常檢魂如月質之受日光則魂不馳魄不去遂能登仙若魄不受魂魂不載魄則魂遊魄降而人死矣今遊魄既回鍊之結成素華而延夀可同大椿之年乘運應靈圖者美學仙有宿縁也洞生神章瓊音逸九霞一唱萬眞會騫與成家九轉景靈備鬱鬱耀玉葩兜術開大一慶享祚多上聖回帝駕嬰兒歘以歌不良辰會一切稽首和空洞生神章瓊音逸九霞者玉章之音合三洞飛玄之炁而成九陽之精也一唱詠間天地萬神交會况我身陰陽魂魄精爽安得不合成一家乎王氏云魄以魂爲家魂魄既合理无騫違九轉景靈備者功滿神炁備具景靈身中虚明神靈之炁也玉葩光彩貌於此見兜術天帝度人之功大有矣一慶享祚多者長生乆視无災害也上聖回駕度人功成嬰兒歌者法身巳見冝乎萬神悅而同應也波羅尼宻不驕樂天生神章第五天炁黃色金書祕字云此太魂精上陽之炁帝眞藏府命元五仙中靈之炁帝諱𩅺霍霧靈雲笈七籖云龍漢元年化生絳霄五仙君此天中之帝以眞炁爲藏府命元天以陰陽木火土金水五行之炁成人之形内列肝心脾肺腎以藏魂神意魄精在天爲五星爲五帝在人爲五常於用爲視言思貌聽修眞之士使五炁居中以結命元故曰五仙中靈翻翻五帝駕飄飄玄上門遊步黃華野回靈驕樂端採集飛空景舊爽多不存翻翻飄飄皆飛揚貌五帝者不驕樂天帝也嘗命駕岀遊玄上門者玄都門也黃華即太虚冲和之際回靈者俳徊靈駕於天端下觀世界欲乗集飛散之魂使之還生奈歲月幽遠舊爽消磨所存无幾矣前達云一失人身萬劫无良可痛哉太微回黃旗無英命靈旙攝召長夜府開度受生魂前言舊爽多不存慮消散於剛風或沉溺於諸趣於是命太微中小童名景精常在帝前回轉中黃之旗以集遊爽又命无英公子主肝魂之神執命靈幡以召魂炁使之受鍊更生太微按度人經音玄注云南極長生大君即朱陵大帝治太微垣司火錬事幽魂乆居沉滯當入火鍊以破陰濁以復陽光俾心源一淨業垢皆空因虚化神復還人道公子輔黃寧總録具形神玉章洞幽靈五轉天地分炁鍊元藏府紫户自生仙公子無英魂神黃寜乃精血三眞名元生君魂與精血相輔總録爲一則形神整具洞幽者微顯闡幽也修眞之士使梵炁回旋帝眞在定金光朗微流雲徘徊自然虎嘯風生龍吟雲聚大寶成矣或曰天一生水以定性也地二生火以定心也天三生木以定形也地四生金以定炁也天五生土以定中宫是謂攅簇五行度人經十轉回靈圖謂乾九坎一成十坤六離四成十巽二兊八成十艮三震七成十爲十轉回靈𧗊周天之極數萬炁還元之通乃知天三木與地二火同居而成一五地四金與天一水同居而成二五戊巳自以五數居中和合四象而生嬰見是謂三五歸一又按河圖天一地二天三地四天五乃水火木金土在天之生數也一得五成六蓋水見土則止二得五成七火以土而養三得五成八木因土而植四得五成九金籍土而生五轉天地分者四象本自然雖屬乎天皆有名无形得土和合始成有象屬乎地也自此五轉之後五炁五精五神凝結昇於紫户丹功成矣數周衆眞會啓陽應感繁玉女灌五香聖母慶萬年三界並歡恱稽首禮天尊數周九轉也修眞火候内丹成須用功九轉如人懷妊九月也啓陽應感繁謂陽神既成身中造化感通吉兆甚多人能勤苦修爲到這境界自見效驗灌五香者黃華玉女引五方眞炁灌沃其身也又云丹熟生香透骨覆頂聖母即乾元聖母前降生時曾衛房保形今見道成豈不欣慶天神地祗向曾備守至此亦爲之悅然則生成大德當歸諸天故曰稽首禮天尊洞玄化應聲天生神章第六天炁白色金書秘字云此天魂精元陽之炁帝眞靈府命元髙眞冲融之炁帝諱虜雲笈七籖云龍漢元年化生景霄冲融君此天中之帝以眞炁爲靈府命元之始西嶽竇眞人修眞指南曰人生六月六津定六府用滋靈也修眞之士魂魄五臟皆巳鍊成陽神上感應聲天之炁以滋其靈靈即炁也冲融者神炁和悦至此隂濁巳盡陽明洞煥煖然如春應聲无色界霄暎冠十方回化輪无影冥期趣道塲靈駕不待轡胡然生神章應聲无色界者明爲元色界天也霄暎冠十方謂光明嘆諸天爲十方之冠回化輪元影與造化相友而不見形迹冥期趣道塲暗合於大道之域度人經青玄注云无色界天人塵染俱淨洞入自然身形微妙或大或小無復色象人不能見故云無色界頌云漸入無爲至道宗一塵不染意圓通回眸下視三千界萬法都來一箇空玉章上五章言命宗下四章言性宗使人保命以長存明性以超脫也靈駕者南華經謂御六炁之辯以遊無窮又何待轡乎至此地位始知生神章之妙朗然不誣矣丹訣云修鍊至五轉眞陽全魂化爲神六轉眞陰全魄化爲炁魂魄内全日中遊行無影與日純陽爲一自慈鬼神不可見陰陽不可測矣空洞諒無崖玄爽亦爲强鍊胎反本初長乘飛玄梁蘄畜丧天眞散思候履常斬伐胞樹滯心遊超上京空洞太虚豈有崖際玄爽亦爲强者言鬼魂始爲人時與聖賢無異安得爲弱因歷劫生死所受天眞爲情欲凋䘮遂不強矣玄梁慶眞羽章云翻翮振九霄悲鳴喚玄梁知爲天中禽名乖不同也謂鍊胎返本之功正欲收歛安靜不可同玄梁輕飛也蘄願也南華經云澤雉十歩一啄百歩一飲不蘄畜乎樊中譬雉在外飲食雖艱終不願畜養籠中不得自由如人受羈絆鬱結以䘮天眞但欲散逸情思履踐常道然後斬伐胞胎樹滯死炁了無罣礙可以心遊玉京矣願會旣玄玄悟我理兼忘介福九天端交禮地辰良願會者悟玄玄之道方契素願也旣解悟則是非人我皆忘之矣至此福不期而介辰不擇而良何迪非言混化歸元一髙結元始王稽首儔靈運長謝囂塵張混合造化三元之炁復歸于一上應元始下主一身所謂天尊雖遠妙近縁泥丸君是也學仙道成之日必應良辰謝絶也囂喧也張飛楊也言自此永絕喧囂塵埃飛楊之境靈化梵輔天生神章第七天炁紫色金書祕字云此天魂精正陽之炁帝眞元府命元髙仙洞笈之炁帝諱霧雲雲笈七籖云龍漢元年化生玉霄洞笈君此天中之帝以眞炁爲元府命元之始西嶽竇眞人云人生七月七精開七竅通光明外耳目口鼻内心孔皆明朗自然知覺修眞當此七轉巳造七覺之地冥慧洞清根塵斷絶有無皆空萬法除滅凡先劫後劫三界十方他我根源過去未來七通八達上下貫徹萬理具爲故曰髙仙洞笈玄會統無崖混炁歸梵輔務猶運靈化潜推無寒暑乘數搆貞條振袂拂輕羽瓊房有妙韻汎登髙神所玄會者萬道之宗統攝三界妙用安可限量混炁者混合飛玄之炁歸於梵輔之天以復大初也務猶乃太一尊神號務猶收守人泥丸後户在天潜運造化寒暑無間乘數搆眞條者乘此七過之數陽光凝合百骸貞固如樹之條枝也根袂拂輕羽將欲飛騰於是忽聞泥丸瓊房九宫之中自成宫商喜炁衝躍火龍玄鶴交舞身中萬神𧗊登髙上神宫與天帝君上一赤子合而爲一此之謂瓊房有妙韻汎登髙神所圓輪無停暎眞仙森列序上上霄衢邈洞元深萬巨秀葉翳翠霞停蔭清泠渚接靈寳畢法此超脫法也神光洞照透岀軀殻上昇太虚與眞仙同列至於雲衢遐邈旁觀洞空洞虚太玄無邊之際下有巨萬之深而我獨露堂堂在清靜性海之中浮秀葉翠霞之羽蓋下暎清泠之渚湛然常寂矣八素陽歌云我超騰羽蓋徘徊清泠渚遨翫怡五神繁想嘯明侣五難縁理去冲心自怡處論超脫在一躍之頃慮五炁之神岀而未熟則時岀時入遨翫而習熟之或動雜想則嘯詠以散之則百神皆和明侣身中神也五難諸說未定恐五帝之魔尚相試難可以理遣俾性天清潔無一毫人欲之私方合至道蓋修鍊至超脫爲極功一時變化最防魔試故丁寧焉爽魂隨本根亹亹空中佇七誦重關開豁滯非神武運通由中發髙唱稽首舉性者命之靈也心者炁之主也心旣無累性天朗明自巳爽魂佇於太空亹亹無怠而不離於本根本根者元炁也七過關竅豁間法身獨見煩惱死生不能爲累非玉章有神武之功安能如是敏速耶運通由中發者有諸内必形諸外也髙唱稽首舉者朗吟而昇舉也髙虚清明天生神章第八天炁碧色金書祕字云此天魂精通陽之炁帝眞華府命元眞靈化凝之炁帝諱霐霽雲笈七籖云龍漢元年化生琅霄化凝君此天中之帝以眞炁爲華府命元之始西嶽竇眞人云人生八月八景神具降眞靈也眞靈旣降五臓亦生華大洞有十華觀門紫户天一精通太元丹華地二炁通凝玄青華天三神通萬生素華地四梵通十方黄華天五始通太清瓊華地六始通冥陰金華天七始通太玄縁華地八元通上清碧華天九元通玉虚瑶華地十玄通玉清混洞太元十華接空此眞靈化凝之炁也清明重霄上合期慶雲際玉章散冲心孤景要靈會清明天帝在重霄之上必無色界以上之天也與諸天期於慶雲之際誦玉章以發翛散冲逸之心慶雲非烟非雲太和妙炁也司馬眞人曰孤景華府之字乃要靈府之启嘗會于此煥落景霞布神衿靡不邁玉條流逸響從容虚妙話此皆紀天上景物之辭景霞者霞彩明煥錯落也衿與襟同言胸次無不超邁玉條逸響其天風動騫林之聲乎大洞辭有玄歌散冲襟玉條流逸響正謂此妙話會眞仙共談玄理也靈音振空洞九玄離幽裔感爽無凝滯去留如解帶明識生神章髙遊無終敗學仙旣度自已當推神章之功上報九玄下資幽爽皆今聞經頓悟出入自在不復爲宿障凝滯去留生死如解衣帯然前輩有語云來如著裩去如脫袴言無可戀也果能明識玉章奥妙成超脫之功則眞性長存歷劫不壞玄景耀雲衢跡超神方外應感無方圓聊以運四大硏心稽首誦衆聖共稱快玄景龍名眞人乘龍上天光耀雲衢踨跡超乎神方之外以其變化法身故能隨機應感運四大者運行於無色界四天也共稱快者翊聖眞君有言曰今日明日可惜可惜大限到來有何功力使不得口頭言用不得紙上黑十方諸聖點頭時此是學人眞箇得无想无結无愛天生神章第九天炁黑色金書袐字云此天魂精萌陽之炁帝眞嶽府命元自然玄照之炁帝諱靈霽雲笈七籖云龍漢元年化生神霄玄照君此天中之帝以眞炁爲嶽府命元之始浮山眞率曰無色界上種民天也人之本性湛然虚明譬如太虚不容一物妄想諸愛如空中花生死輪廻如結空果人能返本還元一念不生萬縁頓息乃生此天始爲不壞修眞之士始於克念至於無念諸陰消盡眞性圓明决超三界此即不壞眞空無上法身也左侍眞人曰嶽府人之腦骨也始生形旣具則必有靈以主之有靈故有元有元故有華有華而後生嶽乃諸神出入之門必待全具方合腦骨以固之今小兒有顖門是其處也爲其炁回滋本根諸神所居謂之靈蓋以其靈能返照子下故曰照無結固無情玄玄虚中澄輪化無方序數來亦叵乘至人澹泊心無結固性無情動清靜而有定不隨運化次序輪轉亦不乘陰陽變遷也誰云無色平峨峨多丘陵㝠心縱一徃髙期清神徵良遇非年歲劫教安可稱無色即無色界上清之境也誰謂此地平坦亦有炁化髙丘大陵如玉山上京峨峨然可以登覽學仙者若欲㝠心縱遊期須三清徵召方得至彼實千載之良遇也浮爽縁故條反胎自有恒靈感動太虚飛歩霄上氷津趣鼓萬流潜凝眞神登無愛故無憂髙觀稽首昇浮爽返胎即大洞經億曾萬祖歷劫種親遊爽散滯俱得更生蓋子孫祖考同此一炁我身旣度祖宗亦得返胎成仙自然之常理又何疑焉况身中之靈本太微三一之神洞合太虚可以飛騰於霄漢髙寒之上矣津趣鼔萬流者問津自天河也紫微夫人云玄波振滄濤洪津鼓萬流駕景盻六虚思與佳人遊是也雖曰進登天仙亦須潜神凝眞受縁淨盡始遂逍遥乃知愛者憂之本也無愛則無憂矣嘗謂人之性天本來清靜澹然如水不受一塵干汙則歷劫長存一爲愛染則癡雲蔽天業風蕩水不復清靜矣其始因愛生貪因貪生煩腦妄想叢雜擾擾勞勞諸苦所萃流轉生死出没於欲海波濤之間曺無了期業識滋焉地獄生焉且七情六慾皆能害性何獨於愛殊不知愛乃業縁之萌蘗情欲之梯媒以其甘柔有毒使人感而不知漸漬日深盤結愈固自非智慧勇猛有定力了悟眞常之士孰能斬絕九章之功自修鍊結胎至于上昇能事畢矣而猶以愛爲言者恐人翫習爲常而不知爲永劫憂患之本分毫洗滌不盡不能超脫故聖人於末章抽關啓錀其義遠矣若夫髙觀天衢稽首上昇切有俟於來者焉太極眞人頌太極神澄大帝大道雖無心可以有情求道徳經謂吾不知其名字之曰道强名之曰大然則道本無名又安得有心哉惟求道者不可不用情佇駕空洞中回盻翳滄流浄明三界外蕭蕭玉京遊眞人佇靈駕於空中回觀滄海渺若塵翳如坡仙謂渺滄海之一栗三界者欲界色界無色界也身心出三界之外浄明無礙可以遊宴玉京自無玄挺運誰能悟㝠趣落落天漢澄俯仰即虚柔自非天生挺特應運之才孰能悟此幽默之旨俯仰天地間至樂存焉虚者天之形柔者地之性七玄散幽夜返胎順沉浮七玄七魄也返生胎息順陰陽而沉浮也冥期苟潜凝陽九無娱憂生死之期陽九之災冥默有定苟能潜光凝神不足爲懼南華經謂安時處順哀樂不能入也覩此去來會時復爲淹留外身而身存眞仙會良儔眞人觀人生死去來之速謂未死之間得以淹留當勉於修省能無容心於内外則金其眞矣道德經云外其身而身存斯人也其眞仙之良儔乎亹亹玄中趣湛湛清漢波代謝若循環椿木不改柯玄玄之趣如清漢之水不絕也代謝生死苦於輪回無定惟得道者特立如大椿不隨衆木開落星霜屢閱而柯葉不改南華經曰死生亦大矣而不得與之變静心念至眞隨運順離羅感應理常通神適逯自徂靜心念至眞志於道也羅綱也隨陰陽之炁運行離諸疑網有感必應徂徃也言無所徃而不通淡遊初無際繁想動九遐飛根散玄葉理返非有他遊心於淡合炁於漢此樂何極繁想若動一念飄蕩九遐喻如樹之根葉飛散培養之則深根固蒂人之想念繁雜靜定之則神還炁聚皆自致也非由外也常能誦玉章玄音徹霄霞甲申洪災至控翮王母家常誦味道之腴脗合造化飛神瑶池之上又何息乎洪災南華經云大浸稽天而不溺永享無終紀豈知年劫多以道爲身不生不滅太虚中長存也洞玄靈寳自然九天生神章經注卷下音釋炁音氣出道書關亦切滓壯士切遠離上于切下力智切駭下指切閡音癡處音杵友别筆到切下同咀在吕切餐平安切重悟止傳容切賞監下音鑑雍觀上音邕下音官料別上音寥下華列切皆應下音英餘音映篤好下音罹音氣冠下音贯綜子宋切笈音及又業切監眞上音繒陵切溉音和胡卧切空洞下音同哺音蛻音碭音蕩絕被巴切歘勿切驕樂下音洛冠十上音貫趣音蘄音促其五難下作平聲亹音尾從七宻切叵普火切冥趣下音陬逯音逮徂莊加切翮音核
