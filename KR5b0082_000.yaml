body:
  text: 九天生神玉章經注序推一生神玉章上帝所以宣示好生之德也故凡寳錬混合登晨之道靡不畢備然旨趣超邁非世常辭苟無傳注不易明也嘗聞衡嶽道士薛幽棲太清供奉李少微西華法師成玄英所傳皆通玄究微惜未之見後之注者雖多惟王隱賢蕭眞祐浮山眞率三家發明頗詳盡然其所見乎有異同觀者不能會其一而反致疑者有之若甲申運度事難考覈而乃深求隱僻驚世駭俗以此傳神者氣之靈乘陰陽擅變化周流上下四方而無間者也天行四時生百物神人大浸稽天而不溺土山焦而不熱乘雲御風物莫能傷皆此神也凡人神聚則生散則死九章以生神爲名其義遠矣舊注亡慮數十家髙者入於渺茫下者泥於流俗每以爲歎客有自吳來者示余以華陽復所注觀其大意會粹諸說之長混而爲一引靈寳黃庭發揮丹道簡而易見若浮雲淨盡皎月當空令人暸然噫是注也學道之指南也言辭云乎哉必有上士勤而行之如吾老子所言者矣至順壬申重午後五日體玄妙應太和眞人武當太清微妙化宫開山張守清序
